# Host reverse proxy: grafana.voterun.app -> Grafana container
#
# The Grafana container is published by deploy/docker-compose.yml on
# 127.0.0.1:3001. Prometheus is not exposed publicly; it is reached only by
# Grafana over the internal Compose network.
#
# Copy to /etc/nginx/conf.d/grafana.voterun.app.conf (or sites-available + symlink),
# then: sudo nginx -t && sudo systemctl reload nginx
# Run `certbot --nginx -d grafana.voterun.app` to add HTTPS automatically.

upstream voterun_grafana {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    listen [::]:80;
    server_name grafana.voterun.app;

    # Grafana Live uses WebSockets for streaming panels and tail views.
    location /api/live/ {
        proxy_pass http://voterun_grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://voterun_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
