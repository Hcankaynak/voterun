# Host reverse proxy: new.voterun.app -> frontend container
#
# The frontend container (nginx serving the SPA) is published by
# deploy/docker-compose.yml on 127.0.0.1:3000. It already proxies /api and /ws
# to the backend internally, so this vhost simply forwards everything to it.
#
# Copy to /etc/nginx/conf.d/new.voterun.app.conf (or sites-available + symlink),
# then: sudo nginx -t && sudo systemctl reload nginx
# Run `certbot --nginx -d new.voterun.app` to add HTTPS automatically.

upstream voterun_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name new.voterun.app;

    client_max_body_size 1m;

    # WebSocket endpoint for real-time board updates.
    location /ws/ {
        proxy_pass http://voterun_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://voterun_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
