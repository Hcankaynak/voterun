# Host reverse proxy: api.voterun.app -> backend container
#
# The backend (Gin) container is published by deploy/docker-compose.yml on
# 127.0.0.1:8081. This vhost exposes the API (and WebSocket) directly under
# api.voterun.app, e.g. for integrations or direct API access.
#
# Copy to /etc/nginx/conf.d/api.voterun.app.conf (or sites-available + symlink),
# then: sudo nginx -t && sudo systemctl reload nginx
# Run `certbot --nginx -d api.voterun.app` to add HTTPS automatically.

upstream voterun_backend {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.voterun.app;

    client_max_body_size 1m;

    # WebSocket endpoint (/ws/boards/:id) served by the backend.
    location /ws/ {
        proxy_pass http://voterun_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://voterun_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
