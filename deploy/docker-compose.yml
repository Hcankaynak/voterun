# Server deployment stack — run this on the server to pull and start VoteRun.
# Pulls prebuilt images from GHCR (no source code or build step on the server).
#
#   cd deploy
#   cp .env.example .env        # then edit the values
#   docker compose pull
#   docker compose up -d
#
# Public traffic is fronted by the host nginx reverse proxy (see deploy/nginx/).
# Container ports are bound to 127.0.0.1 only, so nothing is exposed publicly
# except through that proxy.
services:
  backend:
    image: ghcr.io/hcankaynak/voterun-backend:${IMAGE_TAG:-latest}
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-https://new.voterun.app}
      DB_PATH: /data/voterun.db
      # Required: secret used to sign auth tokens. Set a strong value in .env.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env}
    volumes:
      - voterun-data:/data
    ports:
      # api.voterun.app -> this port (localhost-only; fronted by host nginx)
      - "127.0.0.1:8081:8080"
    restart: unless-stopped

  frontend:
    image: ghcr.io/hcankaynak/voterun-frontend:${IMAGE_TAG:-latest}
    depends_on:
      - backend
    ports:
      # new.voterun.app -> this port (localhost-only; fronted by host nginx)
      - "127.0.0.1:3000:80"
    restart: unless-stopped

  # --- Monitoring ----------------------------------------------------------
  # Prometheus scrapes the backend's /metrics over the internal Compose network
  # (backend:8080), so metrics are never exposed publicly. Grafana visualizes
  # them and is fronted by host nginx at grafana.voterun.app.
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      # Localhost-only; optional, for debugging via an SSH tunnel.
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in deploy/.env}
      GF_SERVER_ROOT_URL: https://grafana.voterun.app
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # grafana.voterun.app -> this port (localhost-only; fronted by host nginx)
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

volumes:
  voterun-data:
  prometheus-data:
  grafana-data:
